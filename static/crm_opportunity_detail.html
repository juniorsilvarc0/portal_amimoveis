<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oportunidade — CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        /* ============================================================
           Opportunity Detail — layout "Pós-Venda PHB" (13 cards)
           ============================================================ */
        .opp-page { display: grid; grid-template-columns: 1fr 320px; gap: 14px; align-items: start; }
        @media (max-width: 1100px) { .opp-page { grid-template-columns: 1fr; } }

        /* Header */
        .opp-head { background: #fff; border-radius: 10px; padding: 14px 18px; border: 1px solid #e5e7eb; margin-bottom: 14px; }
        .breadcrumb { font-size: 12px; color: #8896a6; margin-bottom: 8px; }
        .breadcrumb a { color: #8896a6; text-decoration: none; }
        .breadcrumb a:hover { color: #065676; }
        .opp-head-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
        .opp-head-title { display: flex; gap: 12px; align-items: flex-start; }
        .opp-icon { width: 40px; height: 40px; border-radius: 8px; background: #065676; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .opp-head h1 { font-size: 20px; font-weight: 700; margin: 0; color: #1a1a2e; line-height: 1.2; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .opp-head .subtitle { font-size: 13px; color: #64748b; margin-top: 3px; }
        .st-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; letter-spacing: .3px; text-transform: uppercase; }
        .st-aberta { background: #fef3c7; color: #92400e; }
        .st-ganha  { background: #dcfce7; color: #166534; }
        .st-perdida{ background: #fee2e2; color: #991b1b; }
        .opp-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
        .opp-actions .btn { font-size: 12px; padding: 6px 12px; }
        .opp-owner { text-align: right; font-size: 12px; color: #64748b; display: flex; gap: 10px; align-items: center; }
        .opp-owner .who b { color: #1a1a2e; font-weight: 600; }
        .opp-owner .avatar { width: 38px; height: 38px; border-radius: 50%; background: #065676; color:#fff; display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px; }

        /* Caminho (setinhas verdes) — mantido como hoje */
        .caminho { display: flex; gap: 0; margin-top: 14px; overflow-x: auto; padding: 4px 0; }
        .caminho-step { flex: 1; min-width: 116px; background: #f1f5f9; color: #64748b; padding: 11px 8px 11px 22px; font-size: 12px; font-weight: 600;
            position: relative; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%, 12px 50%); text-align: center; line-height: 1.15; cursor: pointer; }
        .caminho-step:first-child { clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%); padding-left: 12px; }
        .caminho-step.done { background: #22c55e; color: #fff; }
        .caminho-step.current { background: #16a34a; color: #fff; }
        .caminho-step.future { background: #f1f5f9; color: #64748b; }
        .caminho-step .prob { display:block; font-size: 10px; font-weight: 600; opacity: .85; margin-top: 2px; }

        /* Faixa de SLA */
        .sla-faixa { display: flex; flex-wrap: wrap; gap: 22px; align-items: center; margin-top: 10px; padding: 10px 14px; background: #f8fafc; border: 1px solid #eef2f6; border-radius: 8px; font-size: 12px; color: #64748b; }
        .sla-faixa b { color: #1a1a2e; font-weight: 600; }
        .sla-badge { margin-left: auto; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 12px; }
        .sla-ok { background: #dcfce7; color: #166534; }
        .sla-late { background: #fee2e2; color: #991b1b; }
        .sla-none { background: #f1f5f9; color: #64748b; }

        /* Tabs */
        .opp-tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 14px; background: #fff; padding: 0 12px; border-radius: 8px 8px 0 0; overflow-x: auto; }
        .opp-tab { padding: 12px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: #64748b; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; }
        .opp-tab.active { color: #065676; border-bottom-color: #065676; }
        .opp-tab:hover { color: #065676; }
        .opp-tab .count { color: #94a3b8; font-weight: 400; }

        /* Cards (Visão Geral) */
        .vg-grid { display: grid; gap: 12px; margin-bottom: 12px; }
        .vg-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .vg-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .vg-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        /* Corpo fiel ao mockup: abas (esq) + lateral 4,5 (dir, alinhada às abas) + main (esq) + full (largura cheia) */
        .opp-body { display: grid; gap: 12px 14px; align-items: start; }
        .opp-body.has-rail { grid-template-columns: minmax(0, 1fr) 300px; grid-template-areas: "tabs rail" "main rail" "full full"; }
        .opp-body.no-rail  { grid-template-columns: 1fr; grid-template-areas: "tabs" "main" "full"; }
        .opp-body .opp-tabs { grid-area: tabs; margin-bottom: 0; }
        .opp-rail { grid-area: rail; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
        .opp-main { grid-area: main; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
        .opp-main > .vg-grid { margin-bottom: 0; }
        .opp-full { grid-area: full; min-width: 0; }
        @media (max-width: 1000px) { .vg-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 900px)  { .opp-body.has-rail { grid-template-columns: 1fr; grid-template-areas: "tabs" "rail" "main" "full"; } }
        @media (max-width: 760px)  { .vg-3, .vg-2, .vg-4 { grid-template-columns: 1fr; } }
        .vgcard { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .vgcard-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px; border-bottom: 1px solid #f1f5f9; }
        .vgcard-num { width: 22px; height: 22px; border-radius: 6px; background: #065676; color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .vgcard-head h3 { margin: 0; font-size: 13px; font-weight: 700; color: #1a1a2e; flex: 1; }
        .vgcard-head .hbadge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .vgcard-body { padding: 4px 14px 8px; flex: 1; }
        .vgcard-body.two { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
        @media (max-width: 700px) { .vgcard-body.two { grid-template-columns: 1fr; } }

        .field { display: flex; flex-direction: column; padding: 7px 0; border-bottom: 1px solid #f6f8fa; position: relative; }
        .field:last-child { border-bottom: none; }
        .field:hover .field-edit { opacity: 1; }
        .field-label { font-size: 10.5px; font-weight: 600; color: #8896a6; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
        .field-value { font-size: 13px; color: #1a1a2e; min-height: 18px; word-break: break-word; font-weight: 500; }
        .field-value .empty { color: #cbd5e1; font-style: italic; font-weight: 400; }
        .field-value a { color: #065676; text-decoration: none; }
        .field-value a:hover { text-decoration: underline; }
        .field-edit { position: absolute; right: 0; top: 6px; opacity: 0; background: none; border: none; cursor: pointer; color: #94a3b8; transition: opacity .15s; }
        .field-edit:hover { color: #065676; }
        .field-edit svg { width: 13px; height: 13px; }
        .field input.editing, .field select.editing, .field textarea.editing { font-family: inherit; font-size: 13px; padding: 4px 8px; border: 1px solid #065676; border-radius: 4px; width: 100%; box-sizing: border-box; background: #fff; }
        /* Modo NOVO: inputs persistentes */
        .field .n-input { font-family: inherit; font-size: 13px; padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%; box-sizing: border-box; background: #fff; color: #1a1a2e; }
        .field .n-input:focus { outline: none; border-color: #065676; box-shadow: 0 0 0 2px rgba(6,86,118,.15); }
        .field.field-new:hover { background: transparent; }
        .novo-secao { background: #fff; border: 1px solid #e8ecf0; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
        .novo-secao > h3 { margin: 0 0 12px; font-size: 14px; color: #1a1a2e; }
        .novo-secao .field-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 18px; }
        @media (max-width: 900px) { .novo-secao .field-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .novo-secao .field-grid { grid-template-columns: 1fr; } }
        .novo-bar { position: sticky; bottom: 0; display: flex; gap: 12px; align-items: center; background: #fff; border-top: 1px solid #e8ecf0; padding: 14px 18px; margin: 0 -18px -18px; border-radius: 0 0 12px 12px; }
        .novo-bar .hint { margin-right: auto; color: #8896a6; font-size: 13px; }
        .novo-cli-preview { font-size: 12px; color: #64748b; }
        .check-true { color: #16a34a; font-weight: 600; }
        .check-false { color: #cbd5e1; }

        /* Sidebar (4, 5) */
        .opp-sidebar { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 12px; }
        .tl { padding: 6px 14px 12px; }
        .tl-row { display: flex; gap: 10px; position: relative; padding: 8px 0; }
        .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: #065676; flex-shrink: 0; margin-top: 2px; position: relative; z-index: 1; }
        .tl-dot.muted { background: #cbd5e1; }
        .tl-row:not(:last-child)::before { content: ''; position: absolute; left: 5px; top: 14px; bottom: -8px; width: 2px; background: #e5e7eb; }
        .tl-txt { font-size: 12px; }
        .tl-txt .d { font-weight: 600; color: #1a1a2e; }
        .tl-txt .s { color: #8896a6; }
        .alert-row { display: flex; gap: 9px; padding: 9px 14px; border-bottom: 1px solid #f1f5f9; font-size: 12px; color: #475569; align-items: flex-start; }
        .alert-row:last-child { border-bottom: none; }
        .alert-ico { font-size: 15px; line-height: 1.1; }

        /* genéricos card */
        .opp-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
        .opp-card-head { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 8px; align-items: center; }
        .opp-card-head .vgcard-num { background:#065676; }
        .opp-card-head h3 { margin: 0; font-size: 13px; font-weight: 700; color: #1a1a2e; flex: 1; }
        .opp-card-empty { color: #cbd5e1; font-size: 12px; padding: 14px; text-align: center; }

        /* doc checklist */
        .doc-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f6f8fa; font-size: 12.5px; }
        .doc-row:last-child { border-bottom: none; }
        .doc-row .dn { flex: 1; color: #1a1a2e; }
        .doc-st { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .doc-assinado { background: #dcfce7; color: #166534; }
        .doc-concluido { background: #dbeafe; color: #1e40af; }
        .doc-enviado { background: #fef3c7; color: #92400e; }
        .doc-pendente { background: #f1f5f9; color: #94a3b8; }
        .doc-ico { background: none; border: none; cursor: pointer; font-size: 14px; color: #065676; padding: 2px 4px; border-radius: 4px; }
        .doc-ico:hover { background: #eef2f6; }
        .doc-ico.del:hover { background: #fee2e2; }
        /* aba Documentos */
        .doc-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        .doc-table th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .4px; color: #8896a6; font-weight: 700; padding: 6px 8px; border-bottom: 1px solid #eef2f6; }
        .doc-table td { padding: 8px; border-bottom: 1px solid #f6f8fa; vertical-align: middle; }
        .doc-sub { font-size: 10.5px; color: #94a3b8; margin-top: 2px; }
        .doc-status-sel { font-size: 12px; padding: 3px 6px; border: 1px solid #d1d5db; border-radius: 5px; font-family: inherit; }
        .doc-upbtn { font-size: 12px; color: #065676; cursor: pointer; font-weight: 600; }
        .doc-upbtn:hover { text-decoration: underline; }
        .doc-add { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eef2f6; flex-wrap: wrap; }
        .doc-add input[type=text], .doc-add input:not([type]) { flex: 1; min-width: 200px; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 13px; font-family: inherit; }
        .doc-add select { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 13px; font-family: inherit; }
        .doc-add input[type=file] { font-size: 12px; }
        /* Anexos Contábeis (card 13) */
        .anexos-box { border-top: 1px solid #f1f5f9; }
        .anexos-grid { display: grid; grid-template-columns: 1fr 240px; gap: 18px; }
        @media (max-width: 760px) { .anexos-grid { grid-template-columns: 1fr; } }
        .anexos-titulo { font-size: 11px; font-weight: 700; color: #5b21b6; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
        .anexo-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f6f8fa; font-size: 12.5px; }
        .anexo-row:last-of-type { border-bottom: none; }
        .an-nome { flex: 1; color: #1a1a2e; }
        .an-date { font-size: 11px; color: #8896a6; white-space: nowrap; }
        .anexo-add { display: inline-block; margin-top: 8px; font-size: 12px; color: #065676; cursor: pointer; font-weight: 600; }
        .anexo-add:hover { text-decoration: underline; }
        .relatorio-box { background: #faf5ff; border: 1px solid #ede9fe; border-radius: 8px; padding: 12px; }

        /* próxima ação */
        .next-action { padding: 6px 14px 12px; }
        .next-action .na-title { font-size: 13px; font-weight: 600; color: #1a1a2e; display: flex; gap: 7px; align-items: center; }
        .next-action .na-meta { font-size: 11.5px; color: #8896a6; margin: 6px 0 10px; }

        /* automações + legenda */
        .autom { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-top: 4px; }
        .autom h4 { margin: 0 0 12px; font-size: 11px; letter-spacing: .6px; text-transform: uppercase; color: #8896a6; }
        .autom-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        @media (max-width: 980px) { .autom-grid { grid-template-columns: repeat(2, 1fr); } }
        .autom-item h5 { margin: 0 0 6px; font-size: 12.5px; color: #1a1a2e; display: flex; gap: 6px; align-items: center; }
        .autom-item ul { margin: 0; padding-left: 14px; }
        .autom-item li { font-size: 11px; color: #64748b; line-height: 1.6; }
        .legenda { display: flex; flex-wrap: wrap; gap: 16px; padding: 10px 16px; font-size: 11px; color: #64748b; }
        .legenda span { display: flex; align-items: center; gap: 5px; }
        .legenda .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        /* timeline atividades / histórico */
        .timeline { padding: 12px 16px; }
        .tl-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .tl-item:last-child { border: none; }
        .tl-icon { width: 32px; height: 32px; border-radius: 50%; background: #eef2f6; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .tl-content h5 { margin: 0 0 2px; font-size: 13px; font-weight: 600; }
        .tl-content p { margin: 0; font-size: 12px; color: #64748b; }
        .tl-content .date { font-size: 11px; color: #cbd5e1; margin-top: 4px; }
        .stage-hist-row { display: grid; grid-template-columns: 1fr 80px; padding: 10px 16px; gap: 6px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .stage-hist-row .stage-name { font-weight: 600; color: #1a1a2e; }
        .stage-hist-row .meta { color: #8896a6; font-size: 11px; }
        .stage-hist-row .prob { text-align: right; color: #065676; font-weight: 600; }

        /* nota form */
        .nota-form { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
        .nota-form textarea { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 12px; font-family: inherit; resize: vertical; box-sizing: border-box; }
        .nota-form button { margin-top: 6px; padding: 4px 10px; font-size: 12px; background: #065676; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .nota-item { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
        .nota-item .nota-corpo { font-size: 12px; color: #1a1a2e; white-space: pre-wrap; }
        .nota-item .nota-meta { font-size: 11px; color: #8896a6; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-content">
            <header class="topbar">
                <button class="topbar-hamburger"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <span class="topbar-title">Oportunidade</span>
            </header>
            <main class="page-area" id="page">
                <div style="padding:40px;text-align:center;color:#8896a6;">Carregando…</div>
            </main>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/masks.js"></script>
    <script src="/static/js/modal.js"></script>
    <script>
    (async function () {
        'use strict';
        let usuario;
        try { usuario = await api.requireAuth(); } catch (e) { return; }
        renderSidebar(document.getElementById('sidebar'), '/crm/opportunities', usuario);

        // Modo NOVO: /crm/opportunities/novo -> criação com TODOS os campos editáveis
        // (mesma tela do detalhe). Senão, detalhe por id.
        const isNew = location.pathname.endsWith('/crm/opportunities/novo');
        const oppId = isNew ? null : (() => { const m = location.pathname.match(/\/crm\/opportunities\/(\d+)/); return m ? parseInt(m[1], 10) : null; })();
        if (!isNew && !oppId) { document.getElementById('page').innerHTML = '<p>ID inválido.</p>'; return; }
        if (isNew && !api.can('crm_opportunities', 'criar')) { window.location.href = '/crm/opportunities'; return; }
        const canEdit = isNew ? true : api.can('crm_opportunities', 'editar');

        let opp = isNew ? { status: 'aberta' } : null;   // rascunho local no modo novo
        let activeTab = 'visao';
        let novoFocado = false;
        const LK = { clientes: [], pipelines: [], stages: [], imoveis: [], unidades: [], usuarios: [], campanhas: [], correspondentes: null };

        // Opções dos selects novos (card 6 Simulação e Financiamento / card 7 Entrada Facilitada).
        const MODALIDADE_OPTS = [['PRICE', 'PRICE'], ['SAC', 'SAC']];
        const SITUACAO_OPTS = [['PENDENTE', 'Pendente'], ['APROVADO', 'Aprovado'], ['CONFORMIDADE', 'Conformidade'], ['REPROVADO', 'Reprovado']];
        const SIT_LABEL = { PENDENTE: 'Pendente', APROVADO: 'Aprovado', CONFORMIDADE: 'Conformidade', REPROVADO: 'Reprovado' };
        const TIPO_PAG_OPTS = [['BOLETO', 'Boleto'], ['PIX', 'Pix'], ['DEBITO', 'Débito'], ['CREDITO', 'Crédito'], ['DINHEIRO', 'Dinheiro']];
        const TIPO_PAG_LABEL = { BOLETO: 'Boleto', PIX: 'Pix', DEBITO: 'Débito', CREDITO: 'Crédito', DINHEIRO: 'Dinheiro' };
        function correspondenteOpts() { return (LK.correspondentes || []).map(c => [c.id, c.nome]); }

        // Constantes de Documentos — declaradas ANTES de render() (evita TDZ:
        // card10Documentos roda na render inicial e referencia estas consts)
        const DOC_ST_CLS = { assinado: 'doc-assinado', concluido: 'doc-concluido', enviado: 'doc-enviado', pendente: 'doc-pendente' };
        const DOC_ST_TXT = { assinado: 'Assinado', concluido: 'Concluído', enviado: 'Enviado', pendente: 'Pendente' };
        const DOC_SUGESTOES = ['Contrato com a construtora', 'Proposta assinada', 'Ficha de entrevista',
            'Documentos do cliente', 'Comprovante de entrada', 'RG / CPF', 'Comprovante de renda',
            'Comprovante de residência', 'Certidão de casamento', 'Extrato FGTS'];
        const DOC_CHECKLIST_PADRAO = ['Contrato com a construtora', 'Proposta assinada', 'Ficha de entrevista',
            'Documentos do cliente', 'Comprovante de entrada'];

        await render();

        async function render() {
            if (isNew) { await renderNovo(); return; }
            try {
                opp = await api.get('/crm/opportunities/' + oppId + '/full');
            } catch (e) {
                document.getElementById('page').innerHTML = '<p style="color:#ef4444;padding:24px;">' + _esc(e.message) + '</p>';
                return;
            }
            // Correspondentes (CCA) — carrega 1x p/ o select do card 6 (edição inline).
            if (LK.correspondentes === null) {
                try { LK.correspondentes = await api.get('/lookup/correspondentes'); } catch (e) { LK.correspondentes = []; }
            }
            document.getElementById('page').innerHTML = renderHead() + renderBody();
            attachHeadHandlers();
            attachBodyHandlers();
        }

        // ======================================================= MODO NOVO (criação)
        async function renderNovo() {
            try {
                const [clientes, pipelines, imoveis, usuarios, campanhas, correspondentes] = await Promise.all([
                    api.get('/clientes?per_page=500'),
                    api.get('/crm/pipelines?ativo=true'),
                    api.get('/lookup/imoveis'),
                    api.get('/usuarios').catch(() => ({ data: [] })),
                    api.get('/crm/campaigns?ativo=true&per_page=200').catch(() => ({ data: [] })),
                    api.get('/lookup/correspondentes').catch(() => []),
                ]);
                LK.clientes = (clientes && clientes.data) || [];
                LK.pipelines = pipelines || [];
                LK.imoveis = imoveis || [];
                LK.usuarios = (usuarios && usuarios.data) ? usuarios.data : (Array.isArray(usuarios) ? usuarios : []);
                LK.campanhas = (campanhas && campanhas.data) || [];
                LK.correspondentes = correspondentes || [];
            } catch (e) {}

            const qcli = new URLSearchParams(location.search).get('cliente_id');
            if (qcli && !opp.cliente_id) opp.cliente_id = parseInt(qcli, 10);
            if (!opp.pipeline_id) { const def = LK.pipelines.find(p => p.is_default) || LK.pipelines[0]; if (def) opp.pipeline_id = def.id; }
            await carregarStagesNovo();
            if (opp.cliente_id) { const c = LK.clientes.find(x => x.id === opp.cliente_id); if (c && !opp.nome) opp.nome = 'Negociação ' + c.nome; }

            document.getElementById('page').innerHTML =
                '<div class="opp-head"><div class="opp-head-top"><div class="opp-head-title">' +
                    '<div class="opp-icon">📂</div><div><div class="subtitle">Nova oportunidade</div>' +
                    '<h1 id="novoTitulo">' + _esc(opp.nome || 'Nova Oportunidade') + '</h1></div></div></div></div>' +
                novoBody();
            atualizarPreviewCliente();
            attachNovoHandlers();
            if (!novoFocado) { const f = document.querySelector('[data-fieldkey="nome"]'); if (f) f.focus(); novoFocado = true; }
        }

            return fldInput(key, label, 'select', Object.assign({ options: options }, opts || {}));

        function novoBody() {
            const clientesOpt = LK.clientes.map(c => [c.id, c.nome + (c.cpf ? ' (' + (typeof maskCPF === 'function' ? maskCPF(c.cpf) : c.cpf) + ')' : '')]);

                sel('stage_id', 'Etapa', LK.stages.map(s => [s.id, s.nome]), { required: true, placeholder: '— Selecione —' }) +

                '<div class="vg-grid vg-2">' + card7EntradaFacilitada() + card8SimulacaoBanco() + '</div>' +
                '<div class="vg-grid vg-2">' + novoCard9Equipe() + card12ResumoFinanceiro() + '</div>' +
                '<div class="vg-grid">' + novoCard13Contabil() + '</div>' +

        function novoBar() {
            return '<div class="novo-secao" style="padding:0;"><div class="novo-bar">' +
                '<span class="hint">Preencha os campos e clique em Criar. Os obrigatórios estão marcados com *.</span>' +
                '<a href="/crm/opportunities" class="btn btn-ghost">Cancelar</a>' +
                '<button class="btn btn-primary" data-act="criar-opp">Criar oportunidade</button>' +

        // Card 1 (novo): dados do cliente vêm do CADASTRO (read-only) + possui_dependentes.
        function novoCard1Cliente() {
            return cardOpen(1, '👤', 'Dados do Cliente',

        // Card 2 (novo): imóvel + unidade em cascata; os campos do snapshot herdam do imóvel/unidade.
        function novoCard2Imovel() {
            return cardOpen(2, '🏠', 'Dados do Imóvel') +
                sel('imovel_id', 'Imóvel (empreendimento)', LK.imoveis.map(i => [i.id, i.nome]), { placeholder: '— Selecione —' }) +
                unidadeSelectNovo() +
                fld('empreendimento_nome', 'Empreendimento', null, 'text') +
                fld('imovel_endereco', 'Endereço do imóvel', null, 'text') +
                fld('imovel_bairro', 'Bairro', null, 'text') +
                fld('imovel_cidade_uf', 'Cidade / Estado', null, 'text') +
                fld('imovel_cep', 'CEP', null, 'text') +
                fld('imovel_tipo', 'Tipo de imóvel', null, 'text') +
                cardClose();

        function unidadeSelectNovo() {
            const opts = LK.unidades.map(u => {

                opts.map(o => '<option value="' + o[0] + '"' + (o[2] ? ' disabled' : '') + (String(opp.unidade_id) === String(o[0]) ? ' selected' : '') + '>' + _esc(o[1]) + '</option>').join('') +

        function novoCard9Equipe() {

                    fld('contabil_data_fechamento', 'Data de fechamento', null, 'date') +
                    fld('comissao_forma_recebimento', 'Forma de recebimento', null, 'text') +

        async function carregarStagesNovo() {
            if (!opp.pipeline_id) { LK.stages = []; return; }
            try { LK.stages = await api.get('/crm/stages?pipeline_id=' + opp.pipeline_id); } catch (e) { LK.stages = []; }
            // etapa default = primeira aberta (senão a primeira)
            if (!opp.stage_id || !LK.stages.some(s => s.id === opp.stage_id)) {
                const aberta = LK.stages.find(s => s.tipo === 'aberto') || LK.stages[0];
                opp.stage_id = aberta ? aberta.id : null;
            }
        }
        async function carregarUnidadesNovo() {
            if (!opp.imovel_id) { LK.unidades = []; return; }
            try { LK.unidades = await api.get('/lookup/unidades', { imovel_id: opp.imovel_id }); } catch (e) { LK.unidades = []; }
        }

        function atualizarPreviewCliente() {
            const box = document.getElementById('cliPreview');
            if (!box) return;
            const c = LK.clientes.find(x => x.id === opp.cliente_id);
            if (!c) { box.innerHTML = 'Selecione o cliente acima.'; return; }
            const tel = c.whatsapp1 || c.telefone_fixo;
            box.innerHTML = [
                c.cpf ? 'CPF: ' + (typeof maskCPF === 'function' ? maskCPF(c.cpf) : c.cpf) : null,
                tel ? 'Tel: ' + (typeof maskPhone === 'function' ? maskPhone(tel) : tel) : null,
                c.email ? 'E-mail: ' + c.email : null,
                c.estado_civil ? 'Estado civil: ' + c.estado_civil : null,
            ].filter(Boolean).map(_esc).join(' &nbsp;·&nbsp; ') || '—';
        }

        function preencherSnapshotUnidade() {
            const u = LK.unidades.find(x => String(x.id) === String(opp.unidade_id));
            const im = LK.imoveis.find(x => x.id === opp.imovel_id);
            // Busca dados completos do imóvel (o lookup só traz id/nome) — usa o /imoveis/{id}.
            return (async () => {
                let imv = null;
                if (opp.imovel_id) { try { imv = await api.get('/imoveis/' + opp.imovel_id); } catch (e) {} }
                function set(key, val) {
                    if (val == null || val === '') return;
                    opp[key] = val;
                    // preenche TODOS os inputs desta key (o campo pode estar em mais de um card).
                    document.querySelectorAll('[data-fieldkey="' + key + '"]').forEach(el => { if (!el.value) el.value = String(val); });
                }
                if (imv) {
                    set('empreendimento_nome', imv.nome);
                    set('imovel_endereco', imv.endereco);
                    set('imovel_bairro', imv.bairro);
                    set('imovel_cep', imv.cep);
                    set('imovel_tipo', imv.tipo);
                    if (imv.cidade_nome) set('imovel_cidade_uf', imv.cidade_nome + (imv.cidade_uf ? '/' + imv.cidade_uf : ''));
                }
                if (u) {
                    set('unidade', u.identificador);
                    if (u.valor != null) {
                        opp.valor_imovel = u.valor;
                        document.querySelectorAll('[data-fieldkey="valor_imovel"]').forEach(el => { el.value = numToBr(u.valor); });
                        const vg = document.querySelector('[data-fieldkey="valor"]'); if (vg && !vg.value) { opp.valor = u.valor; vg.value = numToBr(u.valor); }
                    }
                }
            })();
        }

        function attachNovoHandlers() {
            if (typeof autoMask === 'function') autoMask(document.getElementById('page'));
            const page = document.getElementById('page');

            // Buffer de cada input persistente -> opp (rascunho), sem re-render (mantém foco).
            page.querySelectorAll('.n-input').forEach(el => {
                const key = el.dataset.fieldkey, type = el.dataset.fieldtype;
                const buffer = () => {
                    let val = el.value;
                    if (type === 'bool') val = (val === 'true');
                    else if (type === 'money') val = brToNum(el.value);
                    else if (type === 'number') val = val ? parseInt(val, 10) : null;
                    else if (type === 'decimal') val = val ? parseFloat(val) : null;
                    else if (type === 'unidade') val = val ? parseInt(val, 10) : null;
                    // selects: FK numérica -> int; enum textual (PRICE, PIX, ...) -> string.
                    else if (type === 'select') val = (val === '' ? null : (/^\d+$/.test(val) ? parseInt(val, 10) : val));
                    else val = (val === '' ? null : val);
                    opp[key] = val;
                    if (key === 'nome') { const h = document.getElementById('novoTitulo'); if (h) h.textContent = el.value.trim() || 'Nova Oportunidade'; }
                    // Mesma coluna aparece em +de 1 card (ex.: valor_entrada em 3/6/7): sincroniza os irmãos.
                    page.querySelectorAll('.n-input[data-fieldkey="' + key + '"]').forEach(sib => { if (sib !== el && sib.value !== el.value) sib.value = el.value; });
                };
                el.addEventListener('input', buffer);
                el.addEventListener('change', buffer);
            });

            // Cascatas / relacionamentos
            const selCliente = page.querySelector('[data-fieldkey="cliente_id"]');
            if (selCliente) selCliente.addEventListener('change', function () {
                opp.cliente_id = this.value ? parseInt(this.value, 10) : null;
                atualizarPreviewCliente();
            });
            const selPipe = page.querySelector('[data-fieldkey="pipeline_id"]');
            if (selPipe) selPipe.addEventListener('change', async function () {
                opp.pipeline_id = this.value ? parseInt(this.value, 10) : null;
                opp.stage_id = null;
                await carregarStagesNovo();
                const st = page.querySelector('[data-fieldkey="stage_id"]');
                if (st) st.innerHTML = '<option value="">— Selecione —</option>' +
                    LK.stages.map(s => '<option value="' + s.id + '"' + (opp.stage_id === s.id ? ' selected' : '') + '>' + _esc(s.nome) + '</option>').join('');
            });
            const selImovel = page.querySelector('[data-fieldkey="imovel_id"]');
            if (selImovel) selImovel.addEventListener('change', async function () {
                opp.imovel_id = this.value ? parseInt(this.value, 10) : null;
                opp.unidade_id = null;
                await carregarUnidadesNovo();
                atualizarUnidadeSelect();
            });
            const btnNovaUnid = document.getElementById('n_nova_unid');
            if (btnNovaUnid) btnNovaUnid.addEventListener('click', novaUnidadeNovo);
            page.querySelector('[data-act="criar-opp"]').addEventListener('click', criarOpp);
            // wire da própria unidade (buffer + autofill) — feito via re-render abaixo
            wireUnidadeChange();
        }

        function wireUnidadeChange() {
            const selU = document.getElementById('n_unidade');
            if (!selU) return;
            selU.addEventListener('change', async function () {
                opp.unidade_id = this.value ? parseInt(this.value, 10) : null;
                if (opp.unidade_id) await preencherSnapshotUnidade();
            });
        }
        function atualizarUnidadeSelect() {
            const wrap = document.getElementById('n_unidade');
            if (!wrap) return;
            wrap.closest('.field').outerHTML = unidadeSelectNovo();
            // re-liga o botão "+ nova" e o change
            const btn = document.getElementById('n_nova_unid');
            if (btn) btn.addEventListener('click', novaUnidadeNovo);
            wireUnidadeChange();
        }

        function novaUnidadeNovo() {
            if (!opp.imovel_id) { showToast('Selecione o imóvel primeiro.', 'error'); return; }
            Modal.prompt('Nova unidade',
                '<div class="form-group"><label>Identificador *</label><input type="text" id="nu-ident" placeholder="Ex: Apto 302"></div>' +
                '<div class="form-group"><label>Valor (R$)</label><input type="text" id="nu-valor" data-mask="money"></div>',
                async function () {
                    const ident = document.getElementById('nu-ident').value.trim();
                    if (!ident) { showToast('Informe o identificador.', 'error'); return false; }
                    const num = brToNum(document.getElementById('nu-valor').value);
                    const nova = await api.post('/imoveis/' + opp.imovel_id + '/unidades', { identificador: ident, valor: num });
                    showToast('Unidade criada.');
                    await carregarUnidadesNovo();
                    opp.unidade_id = nova.id;
                    atualizarUnidadeSelect();
                    await preencherSnapshotUnidade();
                },
                { confirmLabel: 'Criar', width: '420px' });
            setTimeout(function () { const f = document.getElementById('nu-valor'); if (f && typeof autoMask === 'function') autoMask(f.closest('.modal') || document.body); }, 30);
        }

        async function criarOpp() {
            if (!opp.nome || !String(opp.nome).trim()) { showToast('Informe o nome da oportunidade.', 'error'); return; }
            if (!opp.cliente_id) { showToast('Selecione o cliente.', 'error'); return; }
            if (!opp.pipeline_id || !opp.stage_id) { showToast('Selecione pipeline e etapa.', 'error'); return; }
            const btn = document.querySelector('[data-act="criar-opp"]');
            if (btn) { btn.disabled = true; btn.textContent = 'Criando…'; }
            // monta o payload só com o que tem valor (o back preenche o snapshot do imóvel/unidade)
            const payload = {};
            Object.keys(opp).forEach(k => { if (opp[k] !== undefined && opp[k] !== null && opp[k] !== '') payload[k] = opp[k]; });
            try {
                const nova = await api.post('/crm/opportunities', payload);
                showToast('Oportunidade criada!');
                setTimeout(() => { window.location.href = '/crm/opportunities/' + nova.id; }, 600);
            } catch (e) {
                showToast(e.message || 'Erro ao criar oportunidade.', 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Criar oportunidade'; }
            }
        }

        // ============================================================ HEADER
        function statusInfo(s) {
            if (s === 'ganha')   return { cls: 'st-ganha',   txt: 'Ganha' };
            if (s === 'perdida') return { cls: 'st-perdida', txt: 'Perdida' };
            return { cls: 'st-aberta', txt: 'Em andamento' };
        }
        function renderHead() {
            const st = statusInfo(opp.status);
            const pnome = opp.active_pipeline_nome || opp.pipeline_nome;
            const isPos = opp.fase_ativa === 'pos_venda';
            const empre = opp.empreendimento_nome || opp.imovel_nome || '';
            const sub = [empre, opp.unidade].filter(Boolean).join(' – ') + (pnome ? '  •  ' + pnome : '');
            const posChip = isPos ? ' <span class="st-badge" style="background:#ede9fe;color:#5b21b6;">Pós-venda</span>' : '';
            const posLine = isPos ? '<div class="subtitle" style="color:#7c3aed;">Venda ganha → em pós-venda' + (opp.pos_venda_iniciada_em ? ' desde ' + fmtDate(opp.pos_venda_iniciada_em) : '') + '</div>' : '';
            const prop = opp.proprietario_email || '—';
            const corr = opp.corretor_imobiliaria_email || opp.construtora_nome || '—';
            const ini = (opp.proprietario_email || '?').slice(0, 1).toUpperCase();
            return '<div class="opp-head">' +
                '<div class="breadcrumb"><a href="/crm/opportunities">Oportunidades</a> › ' + _esc(pnome || 'Pipeline') + ' › ' + _esc(opp.nome) + '</div>' +
                '<div class="opp-head-top">' +
                    '<div class="opp-head-title">' +
                        '<div class="opp-icon">📂</div>' +
                        '<div>' +
                            '<h1>' + _esc(opp.nome) + ' <span class="st-badge ' + st.cls + '">' + st.txt + '</span>' + posChip + '</h1>' +
                            '<div class="subtitle">' + _esc(sub) + '</div>' + posLine +
                        '</div>' +
                    '</div>' +
                    '<div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;">' +
                        '<div class="opp-owner"><div class="who">' +
                            'Proprietário: <b>' + _esc(prop) + '</b><br>Corretor: <b>' + _esc(corr) + '</b>' +
                        '</div><div class="avatar">' + _esc(ini) + '</div></div>' +
                        '<div class="opp-actions">' +
                            (canEdit ? '<button class="btn btn-ghost" data-act="alterar-prop">Alterar Proprietário</button>' : '') +
                            '<button class="btn btn-ghost" data-act="mais-acoes">Mais ações ▾</button>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                renderCaminho() +
                renderSlaFaixa() +
            '</div>';
        }

        function activeStageId() { return opp.active_stage_id != null ? opp.active_stage_id : opp.stage_id; }
        function renderCaminho() {
            const allStages = opp.stages || [];
            const activeId = activeStageId();
            const active = allStages.find(s => s.id === activeId) || {};
            const currentOrdem = active.ordem || 0;
            let toShow;
            if (active.tipo === 'perdido') toShow = allStages.filter(s => s.ordem <= currentOrdem);
            else toShow = allStages.filter(s => s.tipo !== 'perdido');
            return '<div class="caminho">' +
                toShow.map(s => {
                    let cls;
                    if (s.ordem < currentOrdem) cls = 'done';
                    else if (s.id === activeId) cls = 'current';
                    else cls = 'future';
                    return '<div class="caminho-step ' + cls + '" data-stage-id="' + s.id + '" title="' + _esc(s.nome) + '">' +
                        (cls === 'done' ? '✓ ' : '') + _esc(s.nome) +
                        '<span class="prob">' + (s.probabilidade != null ? s.probabilidade + '%' : '') + '</span>' +
                    '</div>';
                }).join('') +
            '</div>';
        }

        function renderSlaFaixa() {
            const cur = (opp.stages || []).find(s => s.id === activeStageId()) || {};
            const entrou = opp.entrou_na_etapa_em;
            const sla = cur.sla_dias;
            const tempo = entrou ? daysBetween(entrou, new Date()) : null;
            let badge;
            if (sla == null) badge = '<span class="sla-badge sla-none">SLA não definido</span>';
            else if (tempo != null && tempo > sla) badge = '<span class="sla-badge sla-late">ATRASADO</span>';
            else badge = '<span class="sla-badge sla-ok">NO PRAZO</span>';
            return '<div class="sla-faixa">' +
                '<span>Entrou na etapa em: <b>' + (entrou ? fmtDate(entrou) : '—') + '</b></span>' +
                '<span>Tempo na etapa: <b>' + (tempo != null ? tempo + ' dia' + (tempo === 1 ? '' : 's') : '—') + '</b></span>' +
                '<span>SLA da etapa: <b>' + (sla != null ? sla + ' dias' : '—') + '</b></span>' +
                badge +
            '</div>';
        }

        // ============================================================ TABS
        function renderTabs() {
            const tabs = [
                ['visao', 'Visão Geral', null],
                ['atividades', 'Atividades', (opp.activities || []).length],
                ['documentos', 'Documentos', (opp.documentos || []).length],
                ['contabil', 'Contábil / Fechamento', null],
                ['historico', 'Histórico', (opp.stage_history || []).length],
                ['notas', 'Notas', (opp.notas || []).length],
            ];
            return '<div class="opp-tabs">' + tabs.map(([k, label, count]) =>
                '<div class="opp-tab' + (activeTab === k ? ' active' : '') + '" data-tab="' + k + '">' +
                    _esc(label) + (count != null ? ' <span class="count">(' + count + ')</span>' : '') +
                '</div>').join('') + '</div>';

        // Corpo: abas + lateral (só na Visão Geral) + main + full, via grid-template-areas

            const acts = acoesPendentes();

        // ---- Card 4: Linha do Tempo da Etapa Atual (sidebar) ----
        function card4Timeline() {
            const cur = (opp.stages || []).find(s => s.id === opp.stage_id) || {};
            const entrou = opp.entrou_na_etapa_em;
            const sla = cur.sla_dias;
            const rows = [];
            if (entrou) rows.push(['', fmtDate(entrou), 'Cliente entrou na etapa', false]);
            if (entrou && sla != null) {
                const prazo = addDays(entrou, sla);
                rows.push(['', fmtDate(prazo), 'Prazo da etapa (' + sla + ' dias)', false]);
                const rest = daysBetween(new Date(), prazo);
                const restTxt = rest > 0 ? 'Faltam ' + rest + ' dia' + (rest === 1 ? '' : 's') + ' para o prazo'
                    : rest === 0 ? 'Prazo é hoje' : 'Atrasado há ' + (-rest) + ' dia' + (rest === -1 ? '' : 's');
                rows.push(['muted', '', restTxt, true]);
            }
            const body = rows.length
                ? '<div class="tl">' + rows.map(([dotCls, d, s]) =>
                    '<div class="tl-row"><div class="tl-dot ' + dotCls + '"></div>' +
                    '<div class="tl-txt">' + (d ? '<div class="d">' + _esc(d) + '</div>' : '') + '<div class="s">' + _esc(s) + '</div></div></div>').join('') + '</div>'
                : '<div class="opp-card-empty">Sem histórico de etapa.</div>';
            return '<div class="opp-card"><div class="opp-card-head"><span class="vgcard-num">4</span><h3>Linha do Tempo da Etapa Atual</h3></div>' + body + '</div>';
        }

        // ---- Card 5: Alertas e Lembretes (sidebar) ----
        function card5Alertas() {
            const alerts = [];
            const cur = (opp.stages || []).find(s => s.id === activeStageId()) || {};
            const tempo = opp.entrou_na_etapa_em ? daysBetween(opp.entrou_na_etapa_em, new Date()) : null;
            // SLA da etapa (prazo vencido / cliente parado)
            if (opp.entrou_na_etapa_em && cur.sla_dias != null) {
                const rest = cur.sla_dias - (tempo || 0);
                if (rest < 0) alerts.push(['🔴', '<strong>SLA estourado</strong> há ' + (-rest) + ' dia(s) nesta etapa (cliente parado).']);
                else if (rest <= 3) alerts.push(['⏰', 'SLA da etapa: faltam ' + rest + ' dia(s) (prazo ' + fmtDate(addDays(opp.entrou_na_etapa_em, cur.sla_dias)) + ').']);
            } else if (cur.sla_dias == null && tempo != null && tempo >= 15) {
                alerts.push(['⏱️', 'Cliente parado há ' + tempo + ' dias nesta etapa.']);
            }
            // Tarefas pendentes (vencidas em vermelho)
            acoesPendentes().sort(byPrazo).slice(0, 4).forEach(a => {
                const prazo = a.data_atividade;
                const venc = prazo && new Date(prazo) < new Date();
                alerts.push([venc ? '⚠️' : '📅', (venc ? '<strong style="color:#ef4444;">' : '') + _esc(a.assunto) + (venc ? '</strong>' : '') +
                    (prazo ? ' — ' + fmtDate(prazo) : '') + (venc ? ' (vencida)' : '')]);
            });
            const body = alerts.length
                ? alerts.map(([ico, txt]) => '<div class="alert-row"><span class="alert-ico">' + ico + '</span><span>' + txt + '</span></div>').join('')
                : '<div class="opp-card-empty">Sem alertas no momento.</div>';
            return '<div class="opp-card"><div class="opp-card-head"><span class="vgcard-num">5</span><h3>Alertas e Lembretes</h3></div>' + body +
                '<div style="padding:8px 14px;border-top:1px solid #f1f5f9;"><a href="#" data-act="tab-atividades" style="font-size:11.5px;font-weight:600;">Ver todos os alertas →</a></div></div>';
        }

        // ============================================================ CARD/FIELD HELPERS
        // cardHead = só cabeçalho (sem body). cardOpen = head + body padrão.
        // Cards com corpo 2-col (.vgcard-body.two) DEVEM usar cardHead (senão fica .vgcard sem fechar).
        function cardHead(num, icon, title, headExtra) {
            return '<div class="vgcard"><div class="vgcard-head"><span class="vgcard-num">' + num + '</span>' +
                '<h3>' + _esc(title) + '</h3>' + (headExtra || '') + '</div>';
        }
        function cardOpen(num, icon, title, headExtra) {
            return cardHead(num, icon, title, headExtra) + '<div class="vgcard-body">';
        }
        function cardClose() { return '</div></div>'; }
        function editBtn() {
            return !canEdit ? '' : '<button class="field-edit" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
        }
        // read-only field
        function ro(label, value) {
            const display = (value == null || value === '') ? '<span class="empty">—</span>' : _esc(String(value));
            return '<div class="field"><span class="field-label">' + _esc(label) + '</span><span class="field-value">' + display + '</span></div>';
        }
        // editable field. `opts.options` (pares [valor,label]) + `opts.placeholder` p/ selects.
        function fld(key, label, value, type, opts) {
            opts = opts || {};
            if (isNew && key) return fldInput(key, label, type || 'text', opts);
            let display;
            if (type === 'select' && opts.options) {
                const match = opts.options.find(o => String(o[0]) === String(opp[key]));
                display = match ? _esc(String(match[1]))
                    : ((value == null || value === '') ? '<span class="empty">—</span>' : _esc(String(value)));
            } else {
                display = (value == null || value === '') ? '<span class="empty">—</span>' : _esc(String(value));
            }
            const extra = (type === 'select' && opts.options ? ' data-options="' + _attr(JSON.stringify(opts.options)) + '"' : '') +
                (opts.placeholder ? ' data-placeholder="' + _attr(opts.placeholder) + '"' : '');
            return '<div class="field" data-key="' + _esc(key) + '" data-type="' + _esc(type || 'text') + '"' + extra + '>' +
                '<span class="field-label">' + _esc(label) + '</span>' +
                '<span class="field-value">' + display + '</span>' + editBtn() + '</div>';
        }
        function fldBool(key, label, value) {
            if (isNew && key) return fldInput(key, label, 'bool');
            const v = value ? '<span class="check-true">✓ Sim</span>' : '<span class="check-false">✗ Não</span>';
            return '<div class="field" data-key="' + _esc(key) + '" data-type="bool">' +
                '<span class="field-label">' + _esc(label) + '</span>' +
                '<span class="field-value">' + v + '</span>' + editBtn() + '</div>';
        }

        // Modo NOVO: campo já editável (input persistente). O valor sai de `opp` (rascunho).
        function fldInput(key, label, type, opts) {
            opts = opts || {};
            const v = opp[key];
            const req = opts.required ? ' <span style="color:#ef4444;">*</span>' : '';
            const attrs = 'class="n-input" data-fieldkey="' + _esc(key) + '" data-fieldtype="' + _esc(type) + '"' + (opts.id ? ' id="' + opts.id + '"' : '');
            let control;
            if (type === 'bool') {
                control = '<select ' + attrs + '><option value="false"' + (!v ? ' selected' : '') + '>Não</option>' +
                    '<option value="true"' + (v ? ' selected' : '') + '>Sim</option></select>';
            } else if (type === 'date') {
                control = '<input type="date" ' + attrs + ' value="' + _attr(v ? String(v).slice(0, 10) : '') + '">';
            } else if (type === 'money') {
                control = '<input type="text" ' + attrs + ' data-mask="money" inputmode="decimal" value="' + _attr(v != null ? numToBr(v) : '') + '">';
            } else if (type === 'number' || type === 'decimal') {
                control = '<input type="number"' + (type === 'decimal' ? ' step="0.01"' : '') + ' ' + attrs + ' value="' + _attr(v != null ? v : '') + '">';
            } else if (type === 'select') {
                control = '<select ' + attrs + '><option value="">' + (opts.placeholder || '—') + '</option>' +
                    (opts.options || []).map(o => '<option value="' + _attr(o[0]) + '"' +
                        (String(v) === String(o[0]) ? ' selected' : '') + '>' + _esc(o[1]) + '</option>').join('') + '</select>';
            } else if (type === 'textarea') {
                control = '<textarea ' + attrs + ' rows="3">' + _esc(v || '') + '</textarea>';
            } else {
                control = '<input type="text" ' + attrs + ' value="' + _attr(v != null ? v : '') + '" autocomplete="off">';
            }
            return '<div class="field field-new" data-key="' + _esc(key) + '">' +
                '<span class="field-label">' + _esc(label) + req + '</span>' +
                '<span class="field-value">' + control + '</span></div>';
        }
        function fldStatic(label, value) {
            return ro(label, value);
        }

        async function inlineEdit(fieldEl) {
            const key = fieldEl.dataset.key;
            const type = fieldEl.dataset.type;
            if (!key) return;
            const valueEl = fieldEl.querySelector('.field-value');
            const currentVal = opp[key];
            let input;
            if (type === 'bool') {
                input = document.createElement('select');
                input.innerHTML = '<option value="false"' + (!currentVal ? ' selected' : '') + '>Não</option><option value="true"' + (currentVal ? ' selected' : '') + '>Sim</option>';
            } else if (type === 'date') {
                input = document.createElement('input'); input.type = 'date';
                input.value = currentVal ? String(currentVal).slice(0, 10) : '';
            } else if (type === 'number' || type === 'money' || type === 'decimal') {
                input = document.createElement('input'); input.type = 'number'; input.step = (type === 'number') ? '1' : '0.01';
                input.value = currentVal != null ? currentVal : '';
            } else if (type === 'select') {
                input = document.createElement('select');
                let options = [];
                try { options = JSON.parse(fieldEl.dataset.options || '[]'); } catch (e) {}
                const ph = fieldEl.dataset.placeholder || '—';
                const temAtual = currentVal != null && currentVal !== '' && options.some(o => String(o[0]) === String(currentVal));
                // Se o valor salvo não está nas opções (ex.: /lookup falhou), injeta-o já selecionado —
                // senão o blur sem interação viraria null e apagaria o dado.
                const rotuloAtual = (valueEl.textContent || '').trim();
                input.innerHTML = '<option value="">' + _esc(ph) + '</option>' +
                    ((currentVal != null && currentVal !== '' && !temAtual)
                        ? '<option value="' + _attr(currentVal) + '" selected>' + _esc(rotuloAtual || currentVal) + '</option>' : '') +
                    options.map(o => '<option value="' + _attr(o[0]) + '"' + (String(currentVal) === String(o[0]) ? ' selected' : '') + '>' + _esc(o[1]) + '</option>').join('');
            } else {
                input = document.createElement('input'); input.type = 'text'; input.value = currentVal != null ? currentVal : '';
                if (fieldEl.dataset.placeholder) input.placeholder = fieldEl.dataset.placeholder;
            }
            input.className = 'editing';
            valueEl.innerHTML = ''; valueEl.appendChild(input);
            input.focus(); if (input.select) input.select();
            const save = async () => {
                input.removeEventListener('blur', save); input.removeEventListener('keydown', onKey);
                let newVal = input.value;
                if (type === 'bool') newVal = newVal === 'true';
                else if (type === 'number') newVal = newVal ? parseInt(newVal, 10) : null;
                else if (type === 'money' || type === 'decimal') newVal = newVal ? parseFloat(newVal) : null;
                else if (type === 'select') newVal = newVal === '' ? null : (/^\d+$/.test(newVal) ? parseInt(newVal, 10) : newVal);
                else if (!newVal) newVal = null;
                if (newVal === currentVal) { rebuildBody(); return; }
                try { await patch({ [key]: newVal }); } catch (e) { showToast(e.message, 'error'); rebuildBody(); }
            };
            const onKey = e => {
                if (e.key === 'Enter') { e.preventDefault(); save(); }
                // Escape cancela: solta os listeners ANTES do rebuild p/ o blur não re-disparar save()
                // (o rebuild remove o input do DOM -> blur -> save -> 2º rebuild em nó já destacado).
                if (e.key === 'Escape') { input.removeEventListener('blur', save); input.removeEventListener('keydown', onKey); rebuildBody(); }
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', onKey);
        }

        async function patch(patchObj) {
            await api.patch('/crm/opportunities/' + oppId, patchObj);
            // atualiza objeto local e re-renderiza o corpo (sem refetch pesado)
            Object.assign(opp, patchObj);
            showToast('Salvo!');
            rebuildBody();
        }

        // ============================================================ HELPERS
        function fmtDate(v) { if (!v) return null; const d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString('pt-BR'); }
        function fmtDateTime(v) { if (!v) return null; const d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
        function fmtMoney(v) { if (v == null || v === '') return null; return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function daysBetween(a, b) { if (!a || !b) return null; return Math.floor((new Date(b) - new Date(a)) / 86400000); }
        function addDays(v, n) { const d = new Date(v); d.setDate(d.getDate() + n); return d; }
        function _esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function _attr(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function numToBr(v) { return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function brToNum(s) { if (s == null || s === '') return null; const n = parseFloat(String(s).replace(/[R$\s.]/g, '').replace(',', '.')); return isNaN(n) ? null : n; }
        function showToast(msg, type) { const t = document.getElementById('toast'); if (!t) return; t.textContent = msg; t.className = 'toast ' + (type || 'success'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    })();
    </script>
</body>
