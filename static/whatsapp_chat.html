<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp — AM Imóveis</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        .chat { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: calc(100vh - 56px);
                background: var(--card); border-top: 1px solid var(--border); }
        /* -------- coluna esquerda: conversas -------- */
        .conv-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
        .conv-search { padding: 12px; border-bottom: 1px solid var(--border); }
        .conv-search input { width: 100%; box-sizing: border-box; }
        .conv-list { overflow-y: auto; flex: 1; min-height: 0; }
        .conv-item { display: flex; gap: 10px; align-items: center; padding: 12px 14px; cursor: pointer;
                     border-bottom: 1px solid var(--border-light); }
        .conv-item:hover { background: var(--bg); }
        .conv-item.ativa { background: var(--primary-light); }
        .conv-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--secondary); color: #fff;
                       display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex: none; }
        .conv-main { flex: 1; min-width: 0; }
        .conv-top { display: flex; justify-content: space-between; gap: 8px; }
        .conv-nome { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-hora { color: var(--text-muted); font-size: 11px; flex: none; }
        .conv-prev { color: var(--text-muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .conv-badge { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; border-radius: 10px;
                      min-width: 18px; height: 18px; padding: 0 5px; display: inline-flex; align-items: center; justify-content: center; }
        /* -------- coluna direita: mensagens -------- */
        .msg-col { display: flex; flex-direction: column; min-height: 0; background: var(--bg); }
        .msg-head { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; align-items: center; gap: 10px; }
        .msg-head .conv-nome { font-size: 15px; }
        .msg-head a { font-size: 12px; color: var(--secondary); text-decoration: none; margin-left: auto; }
        .msg-list { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
        .bubble { max-width: 68%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .bubble.entrada { align-self: flex-start; background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 3px; }
        .bubble.saida   { align-self: flex-end;   background: #d9fdd3; border-bottom-right-radius: 3px; }
        .bubble .meta { display: flex; gap: 4px; align-items: center; justify-content: flex-end; margin-top: 3px; }
        .bubble .hora { color: var(--text-muted); font-size: 10px; }
        .bubble .tick { font-size: 11px; color: #667781; }
        .bubble .tick.read { color: #53bdeb; }
        .bubble .tick.failed { color: var(--primary); }
        .bubble .naotexto { font-style: italic; color: var(--text-muted); }
        .msg-foot { padding: 12px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 10px; }
        .msg-foot input { flex: 1; }
        .msg-vazio { margin: auto; color: var(--text-muted); text-align: center; padding: 40px; }
        @media (max-width: 720px) {
            .chat { grid-template-columns: 1fr; }
            .chat.tem-ativa .conv-col { display: none; }
            .chat:not(.tem-ativa) .msg-col { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar" aria-label="Menu lateral"></aside>
        <div class="main-content" id="mainContent">
            <header class="topbar">
                <button class="topbar-hamburger" aria-label="Abrir menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span class="topbar-title">WhatsApp</span>
            </header>

            <div class="chat" id="chat">
                <div class="conv-col">
                    <div class="conv-search">
                        <input type="search" id="busca" placeholder="Buscar contato…">
                    </div>
                    <div class="conv-list" id="convList"><div class="msg-vazio">Carregando…</div></div>
                </div>
                <div class="msg-col">
                    <div id="msgArea"><div class="msg-vazio">Selecione uma conversa para começar.</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>

    <script>
    (async function () {
        'use strict';

        var usuario;
        try { usuario = await api.requireAuth(); } catch (e) { return; }
        if (!api.can('chat', 'ver')) { window.location.href = '/'; return; }
        renderSidebar(document.getElementById('sidebar'), '/chat', usuario);

        var canEnviar = api.can('chat', 'criar');

        var chatEl   = document.getElementById('chat');
        var convList = document.getElementById('convList');
        var msgArea  = document.getElementById('msgArea');
        var busca    = document.getElementById('busca');

        var POLL_MS = 3000;
        var pollTimer = null, falhas = 0;
        var conversas = [];
        var ativaId = null;
        var msgsRenderadas = {};   // id -> delivery_status já pintado (evita re-render total)
        var termo = '';

        /* ---- polling encadeado, pausado em aba oculta ---- */
        function agendar() {
            clearTimeout(pollTimer);
            var espera = Math.min(POLL_MS * Math.pow(2, falhas), 30000);
            pollTimer = setTimeout(tick, espera);
        }

        async function tick() {
            if (document.hidden) { agendar(); return; }
            try {
                // NÃO passar search vazio: URLSearchParams converte undefined no literal
                // "undefined", e o backend filtraria por ILIKE %undefined% (zero resultados).
                var params = { per_page: 100 };
                if (termo) params.search = termo;
                var r = await api.get('/chat/conversas', params);
                conversas = r.data || [];
                renderConversas();
                if (ativaId != null) {
                    // Sempre as últimas 50 (não só as novas): assim os TICKS de mensagens já
                    // na tela também evoluem. O merge decide o que re-renderiza.
                    var msgs = await api.get('/chat/conversas/' + ativaId + '/mensagens', { limit: 50 });
                    mergeMensagens(msgs);
                }
                falhas = 0;
            } catch (e) {
                falhas++;
            }
            agendar();
        }

        document.addEventListener('visibilitychange', function () {
            if (!document.hidden) { clearTimeout(pollTimer); tick(); }
        });

        /* ---- lista de conversas ---- */
        function renderConversas() {
            if (!conversas.length) {
                convList.innerHTML = '<div class="msg-vazio">' +
                    (termo ? 'Nenhum contato encontrado.' : 'Nenhuma conversa ainda.') + '</div>';
                return;
            }
            convList.innerHTML = conversas.map(function (c) {
                var nome = c.contato_nome || fmtFone(c.contato_telefone);
                return '<div class="conv-item' + (c.id === ativaId ? ' ativa' : '') + '" data-id="' + c.id + '">' +
                    '<div class="conv-avatar">' + _esc(inicial(nome)) + '</div>' +
                    '<div class="conv-main">' +
                        '<div class="conv-top">' +
                            '<span class="conv-nome">' + _esc(nome) + '</span>' +
                            '<span class="conv-hora">' + fmtHora(c.ultima_mensagem_em) + '</span>' +
                        '</div>' +
                        '<div class="conv-top">' +
                            '<span class="conv-prev">' + _esc(c.ultima_mensagem_previa || '') + '</span>' +
                            (c.nao_lidas > 0 ? '<span class="conv-badge">' + c.nao_lidas + '</span>' : '') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
            Array.prototype.forEach.call(convList.querySelectorAll('.conv-item'), function (el) {
                el.addEventListener('click', function () { abrir(parseInt(el.getAttribute('data-id'), 10)); });
            });
        }

        /* ---- abrir uma conversa ---- */
        async function abrir(id) {
            ativaId = id;
            msgsRenderadas = {};
            chatEl.classList.add('tem-ativa');
            renderConversas();
            renderCabecalhoEArea();
            try { await api.post('/chat/conversas/' + id + '/ler', {}); } catch (e) {}
            try {
                var msgs = await api.get('/chat/conversas/' + id + '/mensagens', { limit: 50 });
                mergeMensagens(msgs, true);
            } catch (e) {}
        }

        function convAtiva() {
            for (var i = 0; i < conversas.length; i++) if (conversas[i].id === ativaId) return conversas[i];
            return null;
        }

        function renderCabecalhoEArea() {
            var c = convAtiva();
            var nome = c ? (c.contato_nome || fmtFone(c.contato_telefone)) : '';
            var leadLink = (c && c.lead_id) ? '<a href="/crm/leads/' + c.lead_id + '/editar">Ver lead ↗</a>' : '';
            msgArea.innerHTML =
                '<div class="msg-col" style="height:100%">' +
                    '<div class="msg-head">' +
                        '<button class="btn btn-ghost" id="btnVoltar" style="display:none">←</button>' +
                        '<div><div class="conv-nome">' + _esc(nome) + '</div></div>' + leadLink +
                    '</div>' +
                    '<div class="msg-list" id="msgList"></div>' +
                    (canEnviar
                        ? '<div class="msg-foot">' +
                              '<input type="text" id="msgInput" placeholder="Mensagem" autocomplete="off">' +
                              '<button class="btn btn-primary" id="btnEnviar">Enviar</button>' +
                          '</div>'
                        : '') +
                '</div>';
            var btnVoltar = document.getElementById('btnVoltar');
            if (window.matchMedia('(max-width: 720px)').matches && btnVoltar) {
                btnVoltar.style.display = '';
                btnVoltar.addEventListener('click', function () {
                    ativaId = null; chatEl.classList.remove('tem-ativa'); renderConversas();
                    msgArea.innerHTML = '<div class="msg-vazio">Selecione uma conversa.</div>';
                });
            }
            var input = document.getElementById('msgInput');
            var btn = document.getElementById('btnEnviar');
            if (btn) {
                btn.addEventListener('click', enviar);
                input.addEventListener('keydown', function (e) { if (e.key === 'Enter') enviar(); });
                input.focus();
            }
        }

        /* ---- merge de mensagens (diff por id; só re-renderiza se mudou algo) ---- */
        function mergeMensagens(msgs, forcar) {
            var lista = document.getElementById('msgList');
            if (!lista) return;
            var precisa = forcar || false;
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                if (msgsRenderadas[m.id] !== m.delivery_status) { precisa = true; break; }
            }
            if (!precisa && msgs.length === Object.keys(msgsRenderadas).length) return;

            var perto = lista.scrollHeight - lista.scrollTop - lista.clientHeight < 80;
            lista.innerHTML = msgs.map(bubbleHtml).join('');
            msgsRenderadas = {};
            msgs.forEach(function (m) { msgsRenderadas[m.id] = m.delivery_status; });
            if (perto || forcar) lista.scrollTop = lista.scrollHeight;
        }

        function bubbleHtml(m) {
            var corpo = (m.tipo && m.tipo !== 'texto')
                ? '<span class="naotexto">[' + _esc(m.tipo) + ']</span>'
                : _esc(m.conteudo || '');
            var tick = '';
            if (m.direcao === 'saida') tick = '<span class="tick ' + m.delivery_status + '">' + tickGlifo(m.delivery_status) + '</span>';
            return '<div class="bubble ' + (m.direcao === 'saida' ? 'saida' : 'entrada') + '">' +
                       corpo +
                       '<span class="meta"><span class="hora">' + fmtHora(m.mensagem_em) + '</span>' + tick + '</span>' +
                   '</div>';
        }

        function tickGlifo(s) {
            if (s === 'read' || s === 'delivered') return '✓✓';
            if (s === 'sent') return '✓';
            if (s === 'failed') return '⚠';
            return '🕗';
        }

        /* ---- enviar ---- */
        async function enviar() {
            var input = document.getElementById('msgInput');
            var btn = document.getElementById('btnEnviar');
            if (!input) return;
            var texto = input.value.trim();
            if (!texto) return;
            input.value = ''; input.disabled = true; if (btn) btn.disabled = true;
            try {
                await api.post('/chat/conversas/' + ativaId + '/mensagens', { texto: texto });
                await tickAgora();   // reflete a bolha nova imediatamente
            } catch (e) {
                showToast(e.message || 'Falha ao enviar.', 'error');
                input.value = texto;   // devolve o texto para não perder
            }
            input.disabled = false; if (btn) btn.disabled = false; input.focus();
        }

        async function tickAgora() {
            if (ativaId == null) return;
            var msgs = await api.get('/chat/conversas/' + ativaId + '/mensagens', { limit: 50 });
            mergeMensagens(msgs, true);
        }

        /* ---- busca (debounced) ---- */
        var buscaTimer = null;
        busca.addEventListener('input', function () {
            clearTimeout(buscaTimer);
            buscaTimer = setTimeout(function () { termo = busca.value.trim(); clearTimeout(pollTimer); tick(); }, 300);
        });

        /* ---- helpers ---- */
        function inicial(nome) { return (String(nome || '?').trim()[0] || '?').toUpperCase(); }
        function fmtFone(f) {
            if (!f) return '—';
            var d = String(f).replace(/\D/g, '');
            if (d.length >= 12) return '+' + d.slice(0, 2) + ' (' + d.slice(2, 4) + ') ' + d.slice(4);
            return f;
        }
        function fmtHora(iso) {
            if (!iso) return '';
            var d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            var hoje = new Date();
            if (d.toDateString() === hoje.toDateString())
                return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }
        function _esc(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                                             .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function showToast(msg, type, duration) {
            var t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.className = 'toast ' + (type || 'success');
            t.classList.add('show');
            setTimeout(function () { t.classList.remove('show'); }, duration || 3500);
        }

        tick();
    })();
    </script>
</body>
</html>
