<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AM Imoveis</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E5094B; --secondary: #065676; --bg: #f7f8fb; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--secondary);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(229,9,75,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 80%, rgba(6,86,118,0.3) 0%, transparent 60%);
        }
        .login-card {
            background: white; border-radius: 16px; padding: 48px 40px; width: 400px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.25);
            position: relative; overflow: hidden;
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        .logo-wrap { text-align: center; margin-bottom: 24px; }
        .logo-wrap img { height: 84px; max-width: 100%; object-fit: contain; }
        .subtitle {
            text-align: center; color: #8896a6; font-size: 13px;
            margin-bottom: 32px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
        }
        label {
            display: block; font-size: 11px; font-weight: 600; color: var(--secondary);
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px;
        }
        input {
            width: 100%; padding: 12px 16px; border: 2px solid #e8ecf0; border-radius: 10px;
            font-size: 14px; margin-bottom: 20px; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(229,9,75,0.08); }
        input::placeholder { color: #b8c4ce; }
        .btn {
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s; letter-spacing: 0.3px;
        }
        .btn:hover { background: #c70840; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(229,9,75,0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .error {
            background: #fff0f3; color: var(--primary); padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px; display: none; text-align: center;
            border: 1px solid rgba(229,9,75,0.15);
        }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-right: 6px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            body { padding: 16px; }
            .login-card {
                width: 100%;
                max-width: 400px;
                padding: 32px 20px;
            }
            .logo-wrap img { height: 68px; }
            .subtitle { font-size: 12px; margin-bottom: 24px; }
            .btn { padding: 14px; font-size: 15px; min-height: 48px; }
            input { padding: 12px 14px; font-size: 16px; /* prevents zoom on iOS */ }
        }

        @media (max-width: 320px) {
            .login-card { padding: 24px 16px; }
            .logo-wrap img { height: 56px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-wrap"><img src="/static/logoAM.png" alt="AM Imoveis"></div>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" required autofocus placeholder="seu@email.com">
            <label>Senha</label>
            <input type="password" id="senha" required placeholder="Sua senha">
            <button type="submit" class="btn" id="btn">Entrar</button>
        </form>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        // Exibe mensagem vinda de ?erro= (ex: redirect por sessão expirada)
        (function() {
            const params = new URLSearchParams(window.location.search);
            const msg = params.get('erro');
            if (msg) {
                const err = document.getElementById('error');
                err.textContent = msg;
                err.style.display = 'block';
            }

            // Redireciona se já estiver logado
            if (window.api && window.api.isLoggedIn()) {
                window.location.href = '/';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const err = document.getElementById('error');
            err.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Entrando...';
            try {
                await api.login(
                    document.getElementById('email').value,
                    document.getElementById('senha').value
                );
                window.location.href = '/';
            } catch (ex) {
                err.textContent = ex.message || 'Credenciais inválidas.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Entrar';
            }
        });
    </script>
</body>
</html>
