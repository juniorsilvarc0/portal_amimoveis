<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campanhas — CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-content">
            <header class="topbar">
                <button class="topbar-hamburger"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <span class="topbar-title">Campanhas</span>
            </header>
            <main class="page-area">
                <div class="page-header">
                    <div><h1 class="page-title">Campanhas</h1><p class="page-subtitle">Origens de leads e canais de marketing</p></div>
                    <div class="page-actions"><button class="btn btn-primary" id="btnNova">Nova Campanha</button></div>
                </div>
                <div class="card" style="padding:0;overflow:hidden;"><div id="grid" style="padding:0;"></div></div>
            </main>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/modal.js"></script>
    <script src="/static/js/datagrid.js"></script>
    <script>
    (async function () {
        let usuario;
        try { usuario = await api.requireAuth(); } catch (e) { return; }
        if (!api.can('crm_campaigns', 'ver')) { window.location.href = '/'; return; }
        var canWrite = api.can('crm_campaigns', 'criar') || api.can('crm_campaigns', 'editar');
        var canDelete = api.can('crm_campaigns', 'excluir');
        renderSidebar(document.getElementById('sidebar'), '/crm/campaigns', usuario);
        if (!canWrite) { var _bn = document.getElementById('btnNova'); if (_bn) _bn.style.display = 'none'; }

        const grid = new DataGrid(document.getElementById('grid'), {
            endpoint: '/crm/campaigns', searchable: true, perPage: 25,
            emptyMessage: 'Nenhuma campanha.',
            columns: [
                { key: 'nome', label: 'Nome', format: v => v || '—' },
                { key: 'tipo', label: 'Tipo', width: '140px', format: v => v || '—' },
                { key: 'status', label: 'Status', width: '100px', format: v => v || '—' },
                { key: 'data_inicio', label: 'Início', width: '110px',
                  format: v => v ? new Date(v).toLocaleDateString('pt-BR') : '—' },
                { key: 'orcamento', label: 'Orçamento', width: '140px', align: 'right',
                  format: v => v ? 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '—' },
            ],
            rowActions: r => {
                const actions = [];
                if (canWrite) actions.push({ label: 'Editar', className: 'btn-ghost', onClick: x => openModal(x) });
                if (canDelete) actions.push({ label: 'Excluir', className: 'btn-danger',
                  onClick: async x => {
                      const ok = await Modal.confirm('Excluir campanha?');
                      if (!ok) return;
                      try { await api.del('/crm/campaigns/' + x.id); showToast('Excluída'); grid.refresh(); }
                      catch (e) { showToast(e.message, 'error'); }
                  } });
                return actions;
            },
        });

        document.getElementById('btnNova').addEventListener('click', () => openModal(null));

        function openModal(c) {
            const html =
                '<div style="display:grid;gap:10px;">' +
                '<label>Nome <input id="m_nome" required value="'+_attr(c?.nome)+'" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;"></label>' +
                '<label>Tipo <select id="m_tipo" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;">' +
                  ['','meta_ads','google_ads','indicacao','whatsapp','site','evento','outro'].map(t => '<option value="'+t+'"'+(c?.tipo===t?' selected':'')+'>'+(t||'—')+'</option>').join('') +
                '</select></label>' +
                '<label>Status <select id="m_status" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;">' +
                  ['ativa','pausada','encerrada'].map(s => '<option value="'+s+'"'+(c?.status===s?' selected':'')+'>'+s+'</option>').join('') +
                '</select></label>' +
                '<label>Data início <input id="m_data_inicio" type="date" value="'+_attr(c?.data_inicio)+'" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;"></label>' +
                '<label>Data fim <input id="m_data_fim" type="date" value="'+_attr(c?.data_fim)+'" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;"></label>' +
                '<label>Orçamento (R$) <input id="m_orcamento" type="number" step="0.01" value="'+_attr(c?.orcamento)+'" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;"></label>' +
                '<label>Descrição <textarea id="m_descricao" rows="2" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;">'+_attr(c?.descricao)+'</textarea></label>' +
                '</div>';
            Modal.prompt(c ? 'Editar Campanha' : 'Nova Campanha', html, async () => {
                const get = id => { const el=document.getElementById(id); return el?(el.value||'').trim():''; };
                const data = {
                    nome: get('m_nome'),
                    tipo: get('m_tipo') || null,
                    status: get('m_status') || 'ativa',
                    data_inicio: get('m_data_inicio') || null,
                    data_fim: get('m_data_fim') || null,
                    orcamento: get('m_orcamento') ? parseFloat(get('m_orcamento')) : null,
                    descricao: get('m_descricao') || null,
                };
                try {
                    if (c) await api.put('/crm/campaigns/' + c.id, data);
                    else await api.post('/crm/campaigns', data);
                    showToast('Salva!'); grid.refresh();
                } catch (e) { showToast(e.message, 'error'); }
            });
        }
        function _attr(v) { return String(v == null ? '' : v).replace(/"/g, '&quot;'); }
        function showToast(msg, type){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast '+(type||'success');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
    })();
    </script>
</body>
</html>
