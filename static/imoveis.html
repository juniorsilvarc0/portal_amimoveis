<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóveis — AM Imóveis</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
</head>
<body>
    <div class="app-layout">

        <aside class="sidebar" id="sidebar" aria-label="Menu lateral"></aside>

        <div class="main-content" id="mainContent">

            <header class="topbar">
                <button class="topbar-hamburger" aria-label="Abrir menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">Imóveis</span>
            </header>

            <main class="page-area">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Imóveis</h1>
                        <p class="page-subtitle">Cadastro de imóveis e empreendimentos</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNovo">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Novo Imóvel
                        </button>
                    </div>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div id="grid" style="padding: 0;"></div>
                </div>

            </main>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/masks.js"></script>
    <script src="/static/js/forms.js"></script>
    <script src="/static/js/modal.js"></script>
    <script src="/static/js/datagrid.js"></script>

    <script>
        (async function () {
            'use strict';

            /* ---- 1. Auth ---- */
            var usuario;
            try {
                usuario = await api.requireAuth();
            } catch (e) {
                return;
            }

            if (!api.can('cad_imoveis', 'ver')) { window.location.href = '/'; return; }

            /* ---- 2. Sidebar ---- */
            renderSidebar(document.getElementById('sidebar'), '/cadastros/imoveis', usuario);

            /* ---- 3. Permissões ---- */
            var canWrite = api.can('cad_imoveis', 'criar') || api.can('cad_imoveis', 'editar');
            var canDelete = api.can('cad_imoveis', 'excluir');
            if (!canWrite) {
                var btn = document.getElementById('btnNovo');
                if (btn) btn.style.display = 'none';
            }

            /* ---- 4. DataGrid ---- */
            var grid = new DataGrid(document.getElementById('grid'), {
                endpoint: '/imoveis',
                searchable: true,
                perPage: 25,
                emptyMessage: 'Nenhum imóvel cadastrado.',
                columns: [
                    {
                        key: 'id',
                        label: '#',
                        sortable: true,
                        width: '60px',
                        align: 'center',
                    },
                    {
                        key: 'nome',
                        label: 'Nome',
                        sortable: true,
                    },
                    {
                        key: 'construtora_nome',
                        label: 'Construtora',
                        format: function (v) { return v || '—'; },
                    },
                    {
                        key: 'cidade_nome',
                        label: 'Cidade',
                        format: function (v) { return v || '—'; },
                    },
                ],
                rowActions: function (row) {
                    var actions = [];
                    if (canWrite) {
                        actions.push({
                            label: 'Unidades',
                            className: 'btn-ghost',
                            onClick: function (r) { openUnidadesModal(r); },
                        });
                        actions.push({
                            label: 'Editar',
                            className: 'btn-ghost',
                            onClick: function (r) { openEditModal(r); },
                        });
                    }
                    if (canDelete) {
                        actions.push({
                            label: 'Excluir',
                            className: 'btn-danger',
                            onClick: function (r) { deletar(r); },
                        });
                    }
                    return actions;
                },
            });

            document.getElementById('btnNovo').addEventListener('click', function () {
                openEditModal(null);
            });

            /* ---- 5. Modal de criar/editar ---- */
            async function openEditModal(row) {
                var isEdit = !!row;

                var m = new Modal({
                    title: isEdit ? 'Editar Imóvel' : 'Novo Imóvel',
                    bodyHtml:
                        '<form id="imovelForm" novalidate>' +
                            '<div class="alert-error" id="alertError"></div>' +
                            '<div class="form-grid-auto">' +
                                '<div class="form-group full-width">' +
                                    '<label for="m-nome">Nome <span class="required">*</span></label>' +
                                    '<input type="text" id="m-nome" name="nome" placeholder="Ex: Residencial Primavera" required>' +
                                    '<small class="field-error"></small>' +
                                '</div>' +
                                '<div class="form-group">' +
                                    '<label for="m-cidade_id">Cidade <span class="required">*</span></label>' +
                                    '<select id="m-cidade_id" name="cidade_id" required>' +
                                        '<option value="">Carregando...</option>' +
                                    '</select>' +
                                    '<small class="field-error"></small>' +
                                '</div>' +
                                '<div class="form-group">' +
                                    '<label for="m-construtora_id">Construtora</label>' +
                                    '<select id="m-construtora_id" name="construtora_id">' +
                                        '<option value="">Carregando...</option>' +
                                    '</select>' +
                                    '<small class="field-error"></small>' +
                                '</div>' +
                                '<div class="form-group full-width">' +
                                    '<label for="m-endereco">Endereço</label>' +
                                    '<input type="text" id="m-endereco" name="endereco" placeholder="Rua, número">' +
                                '</div>' +
                                '<div class="form-group">' +
                                    '<label for="m-bairro">Bairro</label>' +
                                    '<input type="text" id="m-bairro" name="bairro">' +
                                '</div>' +
                                '<div class="form-group">' +
                                    '<label for="m-cep">CEP</label>' +
                                    '<input type="text" id="m-cep" name="cep" data-mask="cep" placeholder="00000-000">' +
                                '</div>' +
                                '<div class="form-group">' +
                                    '<label for="m-tipo">Tipo de imóvel</label>' +
                                    '<input type="text" id="m-tipo" name="tipo" list="tiposImovel" placeholder="Ex: Apartamento">' +
                                    '<datalist id="tiposImovel"><option>Casa</option><option>Apartamento</option><option>Terreno</option><option>Comercial</option></datalist>' +
                                '</div>' +
                            '</div>' +
                        '</form>',
                    footerHtml:
                        '<button class="btn btn-ghost" id="m-cancelar">Cancelar</button>' +
                        '<button class="btn btn-primary" id="m-salvar">' + (isEdit ? 'Salvar' : 'Criar') + '</button>',
                    width: '480px',
                });
                m.open();

                var form          = document.getElementById('imovelForm');
                var cidadeEl      = document.getElementById('m-cidade_id');
                var construtoraEl = document.getElementById('m-construtora_id');
                var salvarBtn     = document.getElementById('m-salvar');

                forms.init(form);
                if (typeof autoMask === 'function') autoMask(form);   // máscara do CEP

                /* Carregar lookups em paralelo */
                try {
                    var results = await Promise.all([
                        api.get('/lookup/cidades'),
                        api.get('/lookup/parceiros', { tipo: 'CONSTRUTORA' }),
                    ]);
                    var cidades      = results[0];
                    var construtoras = results[1];

                    cidadeEl.innerHTML = '<option value="">— Selecione —</option>' +
                        cidades.map(function (c) {
                            return '<option value="' + c.id + '">' + c.nome + '</option>';
                        }).join('');

                    construtoraEl.innerHTML = '<option value="">— Nenhuma —</option>' +
                        construtoras.map(function (p) {
                            return '<option value="' + p.id + '">' + p.nome + '</option>';
                        }).join('');
                } catch (e) {
                    cidadeEl.innerHTML      = '<option value="">Erro ao carregar cidades</option>';
                    construtoraEl.innerHTML = '<option value="">Erro ao carregar construtoras</option>';
                }

                if (row) forms.fillForm(form, row);

                document.getElementById('m-cancelar').addEventListener('click', function () { m.close(); });

                salvarBtn.addEventListener('click', async function () {
                    forms.alertClear();
                    if (!forms.validate(form)) return;

                    var payload = forms.readForm(form);
                    if (payload.cidade_id) payload.cidade_id = parseInt(payload.cidade_id, 10);
                    if (payload.construtora_id) payload.construtora_id = parseInt(payload.construtora_id, 10);
                    else delete payload.construtora_id;

                    salvarBtn.disabled = true;
                    salvarBtn.textContent = 'Salvando...';

                    try {
                        if (isEdit) {
                            await api.put('/imoveis/' + row.id, payload);
                            showToast('Imóvel atualizado.', 'success');
                        } else {
                            await api.post('/imoveis', payload);
                            showToast('Imóvel criado.', 'success');
                        }
                        m.close();
                        grid.refresh();
                    } catch (e) {
                        forms.alertError('Erro ao salvar: ' + (e.message || 'Tente novamente.'));
                        salvarBtn.disabled = false;
                        salvarBtn.textContent = isEdit ? 'Salvar' : 'Criar';
                    }
                });
            }

            /* ---- 5b. Gestão de UNIDADES do imóvel ---- */
            async function openUnidadesModal(imovel) {
                var m = new Modal({
                    title: 'Unidades — ' + _esc(imovel.nome),
                    bodyHtml:
                        '<div style="margin-bottom:14px;padding:12px;background:#f8fafc;border-radius:8px;">' +
                            '<div class="form-grid-auto" style="align-items:end;">' +
                                '<div class="form-group" style="margin:0;"><label for="u-ident">Identificador</label>' +
                                    '<input type="text" id="u-ident" placeholder="Ex: Apto 302"></div>' +
                                '<div class="form-group" style="margin:0;"><label for="u-valor">Valor (R$)</label>' +
                                    '<input type="text" id="u-valor" data-mask="money"></div>' +
                                '<div class="form-group" style="margin:0;"><label for="u-status">Status</label>' +
                                    '<select id="u-status"><option value="disponivel">Disponível</option>' +
                                    '<option value="reservada">Reservada</option><option value="vendida">Vendida</option></select></div>' +
                                '<div class="form-group" style="margin:0;">' +
                                    '<button class="btn btn-primary" id="u-add" style="width:100%;">Adicionar</button></div>' +
                            '</div>' +
                            '<div class="alert-error" id="u-erro" style="margin-top:8px;"></div>' +
                        '</div>' +
                        '<div id="u-lista">Carregando…</div>',
                    footerHtml: '<button class="btn btn-ghost" id="u-fechar">Fechar</button>',
                    width: '680px',
                });
                m.open();
                if (typeof autoMask === 'function') autoMask(document.getElementById('u-valor').closest('.form-grid-auto'));
                document.getElementById('u-fechar').addEventListener('click', function () { m.close(); });

                function moneyToNum(s) {
                    if (!s) return null;
                    var n = parseFloat(String(s).replace(/[R$\s.]/g, '').replace(',', '.'));
                    return isNaN(n) ? null : n;
                }
                function fmtMoney(v) {
                    return v == null ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                }
                var STATUS_LABEL = { disponivel: 'Disponível', reservada: 'Reservada', vendida: 'Vendida' };

                async function refresh() {
                    var box = document.getElementById('u-lista');
                    var list = [];
                    try { list = await api.get('/imoveis/' + imovel.id + '/unidades'); } catch (e) {}
                    if (!list.length) { box.innerHTML = '<div style="color:#8896a6;padding:16px;text-align:center;">Nenhuma unidade cadastrada.</div>'; return; }
                    box.innerHTML =
                        '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
                        '<thead><tr style="text-align:left;color:#8896a6;font-size:11px;text-transform:uppercase;">' +
                            '<th style="padding:6px 8px;">Unidade</th><th style="padding:6px 8px;">Valor</th>' +
                            '<th style="padding:6px 8px;">Status</th><th style="padding:6px 8px;"></th></tr></thead><tbody>' +
                        list.map(function (u) {
                            return '<tr style="border-top:1px solid #f1f5f9;">' +
                                '<td style="padding:8px;font-weight:600;">' + _esc(u.identificador) +
                                    (u.ocupada ? ' <span style="color:#e5094b;font-size:11px;">• em negociação</span>' : '') + '</td>' +
                                '<td style="padding:8px;">' + fmtMoney(u.valor) + '</td>' +
                                '<td style="padding:8px;">' + (STATUS_LABEL[u.status] || u.status) + '</td>' +
                                '<td style="padding:8px;text-align:right;white-space:nowrap;">' +
                                    '<button class="btn btn-ghost" data-edit="' + u.id + '" style="padding:4px 8px;">Editar</button> ' +
                                    '<button class="btn btn-danger" data-del="' + u.id + '" style="padding:4px 8px;">Excluir</button></td>' +
                            '</tr>';
                        }).join('') + '</tbody></table>';

                    box.querySelectorAll('[data-del]').forEach(function (b) {
                        b.addEventListener('click', async function () {
                            var u = list.find(function (x) { return x.id == b.dataset.del; });
                            var aviso = u && u.ocupada ? '<br><small style="color:#e5094b;">Esta unidade tem uma oportunidade ativa; ela ficará sem unidade vinculada.</small>' : '';
                            if (!await Modal.confirm('Excluir a unidade <strong>' + _esc(u.identificador) + '</strong>?' + aviso)) return;
                            try { await api.del('/imoveis/unidades/' + b.dataset.del); showToast('Unidade excluída.'); refresh(); }
                            catch (e) { showToast(e.message || 'Erro ao excluir.', 'error'); }
                        });
                    });
                    box.querySelectorAll('[data-edit]').forEach(function (b) {
                        b.addEventListener('click', function () {
                            var u = list.find(function (x) { return x.id == b.dataset.edit; });
                            editarUnidade(u, refresh);
                        });
                    });
                }

                document.getElementById('u-add').addEventListener('click', async function () {
                    var erro = document.getElementById('u-erro'); erro.classList.remove('show'); erro.textContent = '';
                    var ident = document.getElementById('u-ident').value.trim();
                    if (!ident) { erro.textContent = 'Informe o identificador da unidade.'; erro.classList.add('show'); return; }
                    var payload = { identificador: ident, valor: moneyToNum(document.getElementById('u-valor').value),
                                    status: document.getElementById('u-status').value };
                    this.disabled = true;
                    try {
                        await api.post('/imoveis/' + imovel.id + '/unidades', payload);
                        document.getElementById('u-ident').value = ''; document.getElementById('u-valor').value = '';
                        showToast('Unidade adicionada.'); refresh();
                    } catch (e) { erro.textContent = e.message || 'Erro ao adicionar.'; erro.classList.add('show'); }
                    this.disabled = false;
                });

                await refresh();
            }

            function editarUnidade(u, onSaved) {
                Modal.prompt('Editar unidade',
                    '<div class="form-group"><label>Identificador</label><input type="text" id="eu-ident" value="' + _esc(u.identificador) + '"></div>' +
                    '<div class="form-group"><label>Valor (R$)</label><input type="text" id="eu-valor" data-mask="money" value="' + (u.valor != null ? Number(u.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '') + '"></div>' +
                    '<div class="form-group"><label>Status</label><select id="eu-status">' +
                        ['disponivel','reservada','vendida'].map(function (s) {
                            return '<option value="' + s + '"' + (u.status === s ? ' selected' : '') + '>' + ({disponivel:'Disponível',reservada:'Reservada',vendida:'Vendida'}[s]) + '</option>';
                        }).join('') + '</select></div>',
                    async function () {
                        var ident = document.getElementById('eu-ident').value.trim();
                        if (!ident) { showToast('Informe o identificador.', 'error'); return false; }
                        var val = document.getElementById('eu-valor').value;
                        var num = val ? parseFloat(val.replace(/[R$\s.]/g, '').replace(',', '.')) : null;
                        await api.put('/imoveis/unidades/' + u.id, { identificador: ident, valor: isNaN(num) ? null : num, status: document.getElementById('eu-status').value });
                        showToast('Unidade atualizada.'); if (onSaved) onSaved();
                    },
                    { confirmLabel: 'Salvar', width: '420px' });
                setTimeout(function () { var f = document.getElementById('eu-valor'); if (f && typeof autoMask === 'function') autoMask(f.closest('.modal') || document.body); }, 30);
            }

            /* ---- 6. Excluir ---- */
            async function deletar(row) {
                var ok = await Modal.confirm('Excluir o imóvel <strong>' + _esc(row.nome) + '</strong>?<br><small style="color:#9aa4b0">Esta ação não pode ser desfeita.</small>');
                if (!ok) return;
                try {
                    await api.del('/imoveis/' + row.id);
                    showToast('Imóvel excluído.', 'success');
                    grid.refresh();
                } catch (e) {
                    showToast(e.message || 'Erro ao excluir.', 'error');
                }
            }

            /* ---- Helpers ---- */
            function _esc(s) {
                return String(s || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function showToast(msg, type, duration) {
                type = type || 'success';
                duration = duration || 3500;
                var t = document.getElementById('toast');
                if (!t) return;
                t.textContent = msg;
                t.className = 'toast ' + type;
                t.classList.add('show');
                setTimeout(function () { t.classList.remove('show'); }, duration);
            }
        })();
    </script>
</body>
</html>
