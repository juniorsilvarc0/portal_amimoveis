<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfis de Acesso — AM Imóveis</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        .perfis-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .perfis-table thead th {
            text-align: left;
            padding: 14px 18px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            background: #fafbfc;
        }
        .perfis-table tbody td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }
        .perfis-table tbody tr:hover { background: #fafbfc; }
        .perfis-table tbody tr:last-child td { border-bottom: none; }
        .perfil-nome { font-weight: 600; color: var(--text); }
        .perfil-desc { color: var(--text-muted); }
        .perfil-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .col-center { text-align: center; }
        .col-right { text-align: right; }
        .empty-state {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-layout">

        <aside class="sidebar" id="sidebar" aria-label="Menu lateral"></aside>

        <div class="main-content" id="mainContent">

            <header class="topbar">
                <button class="topbar-hamburger" aria-label="Abrir menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">Perfis de Acesso</span>
            </header>

            <main class="page-area">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Perfis de Acesso</h1>
                        <p class="page-subtitle">Controle de permissões por perfil (RBAC)</p>
                    </div>
                    <div class="page-actions">
                        <a href="/perfis/novo" class="btn btn-primary" id="btnNovo" style="display:none;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Novo Perfil
                        </a>
                    </div>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div id="tableWrap">
                        <div class="empty-state">Carregando perfis…</div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/modal.js"></script>

    <script>
        (async function () {
            'use strict';

            /* ---- 1. Auth ---- */
            var usuario;
            try {
                usuario = await api.requireAuth();
            } catch (e) {
                return;
            }

            /* ---- 2. Sidebar ---- */
            renderSidebar(document.getElementById('sidebar'), '/perfis', usuario);

            /* ---- 3. Guard de visualização ---- */
            if (!api.can('usuarios', 'ver')) {
                window.location.href = '/';
                return;
            }

            /* ---- 4. Permissões ---- */
            var canWrite = api.can('usuarios', 'criar');
            var canEdit = api.can('usuarios', 'editar');
            var canDelete = api.can('usuarios', 'excluir');

            if (canWrite) {
                var btnNovo = document.getElementById('btnNovo');
                if (btnNovo) btnNovo.style.display = '';
            }

            /* ---- 5. Carregar e renderizar ---- */
            await carregar();

            async function carregar() {
                var wrap = document.getElementById('tableWrap');
                wrap.innerHTML = '<div class="empty-state">Carregando perfis…</div>';
                try {
                    var resp = await api.get('/perfis');
                    var perfis = (resp && resp.data) || [];
                    render(perfis);
                } catch (e) {
                    wrap.innerHTML = '<div class="empty-state">Erro ao carregar perfis: ' + _esc(e.message || '') + '</div>';
                }
            }

            function render(perfis) {
                var wrap = document.getElementById('tableWrap');
                if (!perfis.length) {
                    wrap.innerHTML = '<div class="empty-state">Nenhum perfil cadastrado.</div>';
                    return;
                }

                var rows = perfis.map(function (p) {
                    var sysBadge = p.is_system
                        ? ' <span class="badge badge-info" style="margin-left:8px;">Sistema</span>'
                        : '';
                    var nUsers = (p.usuarios_count != null) ? p.usuarios_count : 0;

                    var acoes = [];
                    if (canEdit) {
                        var label = p.is_system ? 'Visualizar' : 'Editar';
                        acoes.push(
                            '<a href="/perfis/' + p.id + '/editar" class="btn btn-ghost btn-sm">' + label + '</a>'
                        );
                    }
                    if (canDelete && !p.is_system) {
                        acoes.push(
                            '<button class="btn btn-danger btn-sm" data-del="' + p.id +
                            '" data-nome="' + _esc(p.nome) + '">Excluir</button>'
                        );
                    }
                    var acoesHtml = acoes.length
                        ? '<div class="perfil-actions">' + acoes.join('') + '</div>'
                        : '<span style="color:var(--text-muted);">—</span>';

                    return '' +
                        '<tr>' +
                            '<td><span class="perfil-nome">' + _esc(p.nome) + '</span>' + sysBadge + '</td>' +
                            '<td><span class="perfil-desc">' + (p.descricao ? _esc(p.descricao) : '—') + '</span></td>' +
                            '<td class="col-center">' +
                                '<span class="badge badge-default">' + nUsers + '</span>' +
                            '</td>' +
                            '<td class="col-right">' + acoesHtml + '</td>' +
                        '</tr>';
                }).join('');

                wrap.innerHTML =
                    '<table class="perfis-table">' +
                        '<thead><tr>' +
                            '<th>Nome</th>' +
                            '<th>Descrição</th>' +
                            '<th class="col-center" style="width:140px;">Nº de usuários</th>' +
                            '<th class="col-right" style="width:200px;">Ações</th>' +
                        '</tr></thead>' +
                        '<tbody>' + rows + '</tbody>' +
                    '</table>';

                // Bind dos botões de excluir
                wrap.querySelectorAll('[data-del]').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        deletar(parseInt(btn.getAttribute('data-del'), 10), btn.getAttribute('data-nome'));
                    });
                });
            }

            async function deletar(id, nome) {
                var ok = await Modal.confirm(
                    'Excluir o perfil <strong>' + _esc(nome) + '</strong>?<br>' +
                    '<small style="color:#9aa4b0">Esta ação não pode ser desfeita.</small>'
                );
                if (!ok) return;
                try {
                    await api.del('/perfis/' + id);
                    showToast('Perfil excluído.', 'success');
                    await carregar();
                } catch (e) {
                    showToast(e.message || 'Erro ao excluir perfil.', 'error');
                }
            }

            /* ---- Helpers ---- */
            function _esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function showToast(msg, type, duration) {
                type = type || 'success';
                duration = duration || 3500;
                var t = document.getElementById('toast');
                if (!t) return;
                t.textContent = msg;
                t.className = 'toast ' + type;
                t.classList.add('show');
                setTimeout(function () { t.classList.remove('show'); }, duration);
            }
        })();
    </script>
</body>
</html>
