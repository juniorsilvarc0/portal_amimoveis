<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos — AM Imoveis</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        .logos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        .logo-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: box-shadow .15s;
        }
        .logo-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,.08);
        }
        .logo-card img {
            max-height: 80px;
            max-width: 100%;
            margin-bottom: 12px;
            object-fit: contain;
        }
        .logo-card .logo-nome {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .logo-card .logo-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px;
            flex-wrap: wrap;
        }
        .upload-area .form-group { margin: 0; }
        .upload-area input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            width: 200px;
        }
        .upload-area input[type="file"] {
            font-size: 13px;
        }
        .empty-msg {
            text-align: center;
            color: #8896a6;
            padding: 48px 24px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="app-layout">

        <aside class="sidebar" id="sidebar" aria-label="Menu lateral"></aside>

        <div class="main-content" id="mainContent">

            <header class="topbar">
                <button class="topbar-hamburger" aria-label="Abrir menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">Logos</span>
            </header>

            <main class="page-area">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Logos</h1>
                        <p class="page-subtitle">Gerencie as logos usadas nos documentos PDF</p>
                    </div>
                </div>

                <!-- Upload form -->
                <div class="card" id="uploadCard">
                    <div class="upload-area">
                        <div class="form-group">
                            <input type="text" id="logoNome" placeholder="Nome da logo" required>
                        </div>
                        <div class="form-group">
                            <input type="file" id="logoArquivo" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                        </div>
                        <button class="btn btn-primary" id="btnUpload">Enviar Logo</button>
                    </div>
                </div>

                <!-- Grid de logos -->
                <div class="card">
                    <div id="logosContainer"></div>
                </div>

            </main>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/modal.js"></script>

    <script>
        (async function () {
            'use strict';

            let usuario;
            try {
                usuario = await api.requireAuth();
            } catch (e) { return; }

            if (!api.can('logos', 'ver')) { window.location.href = '/'; return; }

            renderSidebar(document.getElementById('sidebar'), '/cadastros/logos', usuario);

            var canWrite = api.can('logos', 'criar') || api.can('logos', 'editar');
            var canDelete = api.can('logos', 'excluir');
            if (!canWrite) {
                document.getElementById('uploadCard').style.display = 'none';
            }

            await carregarLogos();

            // Upload
            document.getElementById('btnUpload').addEventListener('click', async function () {
                var nome = document.getElementById('logoNome').value.trim();
                var fileInput = document.getElementById('logoArquivo');
                var file = fileInput.files[0];

                if (!nome) { showToast('Informe o nome da logo.', 'error'); return; }
                if (!file) { showToast('Selecione um arquivo.', 'error'); return; }

                var formData = new FormData();
                formData.append('nome', nome);
                formData.append('arquivo', file);

                try {
                    var token = localStorage.getItem('token');
                    var resp = await fetch('/api/v1/logos', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData,
                    });
                    if (!resp.ok) {
                        var err = await resp.json().catch(function () { return {}; });
                        throw new Error(err.detail || 'Erro ao enviar logo.');
                    }
                    showToast('Logo enviada com sucesso!', 'success');
                    document.getElementById('logoNome').value = '';
                    fileInput.value = '';
                    await carregarLogos();
                } catch (e) {
                    showToast(e.message, 'error');
                }
            });

            async function carregarLogos() {
                var container = document.getElementById('logosContainer');
                try {
                    var logos = await api.get('/logos');
                    if (!logos || !logos.length) {
                        container.innerHTML = '<div class="empty-msg">Nenhuma logo cadastrada.</div>';
                        return;
                    }
                    var html = '<div class="logos-grid">';
                    logos.forEach(function (l) {
                        html += '<div class="logo-card">';
                        html += '<img src="/api/v1/logos/' + l.id + '/imagem" alt="' + _esc(l.nome) + '">';
                        html += '<div class="logo-nome">' + _esc(l.nome) + '</div>';
                        if (canDelete) {
                            html += '<div class="logo-actions">';
                            html += '<button class="btn btn-danger btn-sm" onclick="excluirLogo(' + l.id + ',\'' + _esc(l.nome) + '\')">Excluir</button>';
                            html += '</div>';
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                    container.innerHTML = html;
                } catch (e) {
                    container.innerHTML = '<div class="empty-msg">Erro ao carregar logos.</div>';
                }
            }

            window.excluirLogo = async function (id, nome) {
                var ok = await Modal.confirm(
                    'Excluir a logo <strong>' + nome + '</strong>?<br>' +
                    '<small style="color:#9aa4b0">Recibos que usam esta logo ficarão sem logo.</small>'
                );
                if (!ok) return;
                try {
                    await api.del('/logos/' + id);
                    showToast('Logo excluída.', 'success');
                    await carregarLogos();
                } catch (e) {
                    showToast(e.message || 'Erro ao excluir.', 'error');
                }
            };

            function _esc(s) {
                return String(s || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function showToast(msg, type, duration) {
                type = type || 'success';
                duration = duration || 3500;
                var t = document.getElementById('toast');
                if (!t) return;
                t.textContent = msg;
                t.className = 'toast ' + type;
                t.classList.add('show');
                setTimeout(function () { t.classList.remove('show'); }, duration);
            }
        })();
    </script>
</body>
</html>
